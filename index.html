<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>體重與喝水紀錄</title>
<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}
.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}
input {
  width: 100%;
  padding: 8px;
  margin: 5px 0 10px;
}
button {
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}
.section {
  margin-bottom: 20px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 15px;
}
.water-item {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}
.result {
  background: #eef;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>
<div class="container">

<h2>體重與喝水紀錄</h2>

<!-- 體重區 -->
<div class="section">
<h3>基本資料</h3>

年齡
<input type="number" id="age">

身高 (cm)
<input type="number" id="height">

體重 (kg)
<input type="number" id="weight">

<button onclick="calcBMI()">計算 BMI</button>

<div class="result" id="bmiResult"></div>

</div>

<!-- 喝水目標 -->
<div class="section">
<h3>喝水設定</h3>

每日目標喝水量 (ml)
<input type="number" id="targetWater" placeholder="可自行輸入">

<div class="result" id="waterGoal"></div>

</div>

<!-- 喝水紀錄 -->
<div class="section">
<h3>喝水紀錄</h3>

<div class="water-item">
<label><input type="checkbox" onchange="updateWater()"> 起床 500ml</label>
<span>500ml</span>
</div>

<div class="water-item">
<label><input type="checkbox" onchange="updateWater()"> 上午 1000ml</label>
<span>1000ml</span>
</div>

<div class="water-item">
<label><input type="checkbox" onchange="updateWater()"> 下午 1000ml</label>
<span>1000ml</span>
</div>

<div class="water-item">
<label><input type="checkbox" onchange="updateWater()"> 運動 500ml</label>
<span>500ml</span>
</div>

<div class="water-item">
<label><input type="checkbox" onchange="updateWater()"> 睡前 500ml</label>
<span>500ml</span>
</div>

<div class="result" id="waterTotal">今日已喝：0 ml</div>

<button onclick="resetWater()">重置今日紀錄</button>

</div>

</div>

<script>
let waterValues = [500,1000,1000,500,500];

function calcBMI() {
  let h = document.getElementById("height").value / 100;
  let w = document.getElementById("weight").value;
  let bmi = w / (h*h);

  let status = "";
  if (bmi < 18.5) status = "過瘦";
  else if (bmi < 24) status = "正常";
  else if (bmi < 27) status = "過重";
  else status = "肥胖";

  // 建議體重
  let min = (18.5 * h * h).toFixed(1);
  let max = (24 * h * h).toFixed(1);

  // 喝水建議：體重 x 35ml
  let water = Math.round(w * 35);

  document.getElementById("bmiResult").innerHTML =
    "BMI：" + bmi.toFixed(1) + "<br>" +
    "狀態：" + status + "<br>" +
    "建議體重：" + min + " ~ " + max + " kg";

  document.getElementById("waterGoal").innerHTML =
    "建議每日喝水量：" + water + " ml";
}

function updateWater() {
  let checkboxes = document.querySelectorAll("input[type=checkbox]");
  let total = 0;

  checkboxes.forEach((cb, i) => {
    if (cb.checked) total += waterValues[i];
  });

  document.getElementById("waterTotal").innerText =
    "今日已喝：" + total + " ml";

  let target = document.getElementById("targetWater").value;
  if (target) {
    document.getElementById("waterTotal").innerText +=
      " / 目標：" + target + " ml";
  }
}

function resetWater() {
  let checkboxes = document.querySelectorAll("input[type=checkbox]");
  checkboxes.forEach(cb => cb.checked = false);

  document.getElementById("waterTotal").innerText = "今日已喝：0 ml";
}
</script>

</body>
</html>
