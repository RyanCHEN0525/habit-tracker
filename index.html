<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>健康記錄</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
  background:#f2f2f7;
}

.container{
  max-width:420px;
  margin:auto;
  padding:16px;
}

.card{
  background:white;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

h2{
  font-size:20px;
  margin:10px 0;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin:6px 0 12px;
  font-size:14px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#007aff;
  color:white;
  font-size:15px;
  margin-top:8px;
}

.water-row{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  font-size:14px;
}

.badge{
  padding:4px 8px;
  border-radius:8px;
  background:#eee;
  font-size:12px;
}

.result{
  font-size:14px;
  margin-top:8px;
  line-height:1.6;
}

.chart{
  width:100%;
  height:200px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<!-- 體重 -->
<div class="card">
<h2>體重紀錄</h2>

年齡
<input id="age" type="number">

身高(cm)
<input id="height" type="number">

體重(kg)
<input id="weight" type="number">

<button onclick="saveWeight()">儲存體重</button>

<div class="result" id="bmiInfo"></div>

</div>

<!-- 圖表 -->
<div class="card">
<h2>體重趨勢</h2>
<canvas id="chart" class="chart"></canvas>
</div>

<!-- 喝水 -->
<div class="card">
<h2>喝水紀錄</h2>

每日目標
<input id="targetWater" placeholder="ml">

<div class="water-row"><label><input type="checkbox" onchange="calcWater()"> 起床 500ml</label><span>500</span></div>
<div class="water-row"><label><input type="checkbox" onchange="calcWater()"> 上午 1000ml</label><span>1000</span></div>
<div class="water-row"><label><input type="checkbox" onchange="calcWater()"> 下午 1000ml</label><span>1000</span></div>
<div class="water-row"><label><input type="checkbox" onchange="calcWater()"> 運動 500ml</label><span>500</span></div>
<div class="water-row"><label><input type="checkbox" onchange="calcWater()"> 睡前 500ml</label><span>500</span></div>

<div class="result" id="waterInfo">今日喝水：0 ml</div>

<button onclick="resetWater()">重置喝水</button>
</div>

</div>

<script>

let waterValues=[500,1000,1000,500,500];
let weightHistory = JSON.parse(localStorage.getItem("weights")||"[]");

function saveWeight(){

  let w=parseFloat(document.getElementById("weight").value);
  let h=parseFloat(document.getElementById("height").value)/100;
  let age=document.getElementById("age").value;

  let bmi=w/(h*h);

  let status="";
  if(bmi<18.5) status="過瘦";
  else if(bmi<24) status="正常";
  else if(bmi<27) status="過重";
  else status="肥胖";

  let min=(18.5*h*h).toFixed(1);
  let max=(24*h*h).toFixed(1);

  weightHistory.push({
    date:new Date().toLocaleDateString(),
    weight:w
  });

  localStorage.setItem("weights",JSON.stringify(weightHistory));

  document.getElementById("bmiInfo").innerHTML=
  `BMI：${bmi.toFixed(1)} (${status})<br>
  建議體重：${min} ~ ${max} kg`;

  drawChart();
}

function drawChart(){

  let ctx=document.getElementById("chart").getContext("2d");

  let labels=weightHistory.map(x=>x.date);
  let data=weightHistory.map(x=>x.weight);

  if(window.myChart) window.myChart.destroy();

  window.myChart=new Chart(ctx,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"體重",
        data:data,
        borderColor:"#007aff",
        fill:false,
        tension:0.3
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false}}
    }
  });
}

function calcWater(){

  let c=document.querySelectorAll("input[type=checkbox]");
  let total=0;

  c.forEach((v,i)=>{
    if(v.checked) total+=waterValues[i];
  });

  let target=document.getElementById("targetWater").value;

  document.getElementById("waterInfo").innerHTML=
  `今日喝水：${total} ml` + (target?` / 目標 ${target} ml`:"");
}

function resetWater(){
  document.querySelectorAll("input[type=checkbox]").forEach(v=>v.checked=false);
  document.getElementById("waterInfo").innerText="今日喝水：0 ml";
}

drawChart();

</script>

</body>
</html>
