<script>

let water=[500,1000,1000,500,500];
let data=JSON.parse(localStorage.getItem("w")||"[]");

/* =========================
   體重
========================= */
function saveWeight(){

let w=+weight.value;
let h=height.value/100;

let bmi=w/(h*h);

data.push({
d:new Date().toLocaleDateString(),
w
});

localStorage.setItem("w",JSON.stringify(data));

bmiInfo.innerHTML=`BMI:${bmi.toFixed(1)}`;

draw();
analyze();
}

/* =========================
   圖表
========================= */
function draw(){

if(window.c) window.c.destroy();

let ctx=chart.getContext("2d");

window.c=new Chart(ctx,{
type:"line",
data:{
labels:data.map(x=>x.d),
datasets:[{
data:data.map(x=>x.w),
borderColor:"#007aff",
tension:0.3
}]
},
options:{
plugins:{legend:{display:false}}
}
});
}

/* =========================
   體重分析
========================= */
function analyze(){

if(data.length===0) return;

let w=data.map(x=>x.w);

let start=w[0];
let latest=w[w.length-1];
let diff=latest-start;

let min=Math.min(...w);

let avg7=w.slice(-7).reduce((a,b)=>a+b,0)/Math.min(7,w.length);

let status="";

if(diff<-1) status="🔥 穩定減脂";
else if(diff<1) status="⚠️ 停滯期";
else status="📈 回升中";

bmiInfo.innerHTML+=`

<br><br>
📊 分析<br>
起始：${start} kg<br>
目前：${latest} kg<br>
變化：${diff.toFixed(1)} kg<br>
平均：${avg7.toFixed(1)} kg<br>
最低：${min} kg<br>
狀態：${status}
`;
}

/* =========================
   💧 喝水（已修復核心）
========================= */
function calcWater(){

let c=document.querySelectorAll("input[type=checkbox]");
let total=0;
let saved=[];

c.forEach((x,i)=>{
  if(x.checked){
    total += water[i];
    saved.push(i);
  }
});

/* 🔥 存起來 */
localStorage.setItem("waterState", JSON.stringify(saved));

waterInfo.innerText = total + " ml";
}

/* =========================
   💧 還原喝水狀態
========================= */
function restoreWater(){

let saved = JSON.parse(localStorage.getItem("waterState") || "[]");
let c = document.querySelectorAll("input[type=checkbox]");

c.forEach(x=>x.checked=false);

saved.forEach(i=>{
  if(c[i]) c[i].checked = true;
});

calcWater();
}

/* =========================
   💧 重置喝水
========================= */
function resetWater(){

document.querySelectorAll("input[type=checkbox]")
.forEach(x=>x.checked=false);

localStorage.removeItem("waterState");

waterInfo.innerText="0 ml";
}

/* =========================
   NAV
========================= */
function show(n){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("page"+n).classList.add("active");

document.querySelectorAll(".nav div").forEach(v=>v.classList.remove("active"));
document.querySelectorAll(".nav div")[n-1].classList.add("active");

}

/* =========================
   DARK MODE
========================= */
function toggleDark(){
document.body.classList.toggle("dark");
}

/* =========================
   INIT
========================= */
draw();
analyze();
show(1);

/* 🔥 重點：自動還原喝水 */
restoreWater();

</script>
