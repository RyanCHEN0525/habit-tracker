<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日減脂檢查表</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 520px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

.item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px;
    border-bottom: 1px solid #eee;
    font-size: 15px;
}

.left {
    display: flex;
    align-items: center;
    gap: 10px;
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #333;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #555;
}

.small {
    font-size: 12px;
    color: gray;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">
    <h2>每日檢查</h2>
    <div class="small" id="today"></div>

    <div id="list"></div>

    <button onclick="resetToday()">重置今天</button>
</div>

<script>
const today = new Date().toISOString().split("T")[0];

const items = [
    "體重紀錄",
    "喝水3500ml以上",
    "起床 500ml",
    "上午 1000ml",
    "下午 1000ml",
    "運動時 500ml",
    "睡前 500ml",
    "蛋白質170g以上",
    "步數8000步以上",
    "完成訓練",
    "00:30前睡覺"
];

let data = JSON.parse(localStorage.getItem("dailyCheck")) || {};

if (!data[today]) {
    data[today] = {};
    items.forEach(i => data[today][i] = false);
}

function save() {
    localStorage.setItem("dailyCheck", JSON.stringify(data));
}

function toggle(item) {
    data[today][item] = !data[today][item];
    save();
    render();
}

function render() {
    document.getElementById("today").innerText = "今天：" + today;

    const list = document.getElementById("list");
    list.innerHTML = "";

    items.forEach(item => {
        const checked = data[today][item];

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div class="left">
                <input type="checkbox" ${checked ? "checked" : ""} onchange="toggle('${item}')">
                <span>${item}</span>
            </div>
            <span>${checked ? "✔" : ""}</span>
        `;

        list.appendChild(div);
    });
}

function resetToday() {
    if (!confirm("確定要重置今天嗎？")) return;

    data[today] = {};
    items.forEach(i => data[today][i] = false);

    save();
    render();
}

render();
</script>

</body>
</html>
