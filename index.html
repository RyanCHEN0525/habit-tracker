<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Health App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
}

.container{
  padding:16px;
  padding-bottom:140px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#007aff;
  color:white;
}

.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  background:#fff;
  padding:12px 0;
  border-top:1px solid #ddd;
}

.nav div{
  font-size:13px;
}

.page{display:none;}
.page.active{display:block;}

</style>
</head>

<body>

<div class="container">

<!-- 體重 -->
<div id="page1" class="page active">

<div class="card">
<h2>體重</h2>

身高
<input id="height">

體重
<input id="weight">

<button onclick="saveWeight()">儲存</button>

<div id="bmiInfo"></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<!-- 喝水 -->
<div id="page2" class="page">

<div class="card">
<h2>喝水</h2>

<div><input type="checkbox" onchange="calcWater()"> 起床 500</div>
<div><input type="checkbox" onchange="calcWater()"> 上午 1000</div>
<div><input type="checkbox" onchange="calcWater()"> 下午 1000</div>
<div><input type="checkbox" onchange="calcWater()"> 運動 500</div>
<div><input type="checkbox" onchange="calcWater()"> 睡前 500</div>

<div id="waterInfo">0 ml</div>

<button onclick="resetWater()">重置</button>

</div>

</div>

<!-- 設定 -->
<div id="page3" class="page">

<div class="card">
<button onclick="toggleDark()">切換深色模式</button>
</div>

</div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="show(1)">體重</div>
<div onclick="show(2)">喝水</div>
<div onclick="show(3)">設定</div>
</div>

<script>

let water=[500,1000,1000,500,500];
let data=JSON.parse(localStorage.getItem("w")||"[]");

/* ========= 體重 ========= */
function saveWeight(){

let w=+weight.value;
let h=height.value/100;

let bmi=w/(h*h);

data.push({d:new Date().toLocaleDateString(),w});

localStorage.setItem("w",JSON.stringify(data));

bmiInfo.innerHTML="BMI:"+bmi.toFixed(1);

draw();
}

/* ========= 圖表 ========= */
function draw(){

if(window.c) window.c.destroy();

let ctx=chart.getContext("2d");

window.c=new Chart(ctx,{
type:"line",
data:{
labels:data.map(x=>x.d),
datasets:[{data:data.map(x=>x.w),borderColor:"#007aff"}]
},
options:{plugins:{legend:{display:false}}}
});

}

/* ========= 💧 喝水（修好版本） ========= */
function calcWater(){

let c=document.querySelectorAll("input[type=checkbox]");
let total=0;
let saved=[];

c.forEach((x,i)=>{
if(x.checked){
total+=water[i];
saved.push(i);
}
});

localStorage.setItem("water",JSON.stringify(saved));

waterInfo.innerText=total+" ml";
}

/* ========= 還原喝水 ========= */
function restoreWater(){

let saved=JSON.parse(localStorage.getItem("water")||"[]");
let c=document.querySelectorAll("input[type=checkbox]");

c.forEach(x=>x.checked=false);

saved.forEach(i=>{
if(c[i]) c[i].checked=true;
});

calcWater();
}

/* ========= 重置 ========= */
function resetWater(){

document.querySelectorAll("input[type=checkbox]")
.forEach(x=>x.checked=false);

localStorage.removeItem("water");

waterInfo.innerText="0 ml";
}

/* ========= NAV ========= */
function show(n){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("page"+n).classList.add("active");

}

/* ========= INIT ========= */
draw();
restoreWater();

</script>

</body>
</html>
