<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>減脂 Pro Max</title>

<style>
:root {
    --bg: #f4f6f8;
    --card: #fff;
    --text: #111;
}

.dark {
    --bg: #0f0f10;
    --card: #1c1c1e;
    --text: #fff;
}

body {
    margin: 0;
    font-family: -apple-system;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 520px;
}

.card {
    background: var(--card);
    padding: 15px;
    border-radius: 14px;
    margin-bottom: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

h2 {
    margin: 0 0 10px;
}

.row {
    display: flex;
    gap: 8px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #333;
    color: white;
}

.progress {
    height: 10px;
    background: #ddd;
    border-radius: 20px;
    overflow: hidden;
}

.bar {
    height: 100%;
    background: #4caf50;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #eee;
}

small { opacity: 0.7; }
</style>
</head>

<body>

<div class="container">

<button onclick="toggleDark()">🌙 深色模式</button>

<!-- 身體資料 -->
<div class="card">
<h2>身體數據</h2>
<div class="row">
<input id="age" placeholder="年齡">
<input id="height" placeholder="身高 cm">
<input id="weight" placeholder="體重 kg">
</div>
<button onclick="calcBMI()">計算 BMI</button>

<div id="bmiResult"></div>
</div>

<!-- 減脂目標 -->
<div class="card">
<h2>減脂進度 83 → 75kg</h2>
<div class="progress">
<div class="bar" id="weightBar"></div>
</div>
<div id="weightInfo"></div>
</div>

<!-- 喝水 -->
<div class="card">
<h2>喝水 3500ml</h2>
<div class="progress">
<div class="bar" id="waterBar"></div>
</div>
<div class="row">
<input id="waterInput" placeholder="ml">
<button onclick="addWater()">+水</button>
</div>
<div id="waterInfo"></div>
</div>

<!-- 打卡 -->
<div class="card">
<h2>每日任務</h2>
<div id="tasks"></div>
</div>

<!-- 30天紀錄 -->
<div class="card">
<h2>最近30天</h2>
<div id="history"></div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("proData")) || {};
let today = new Date().toISOString().split("T")[0];

const tasksList = [
"蛋白質170g",
"8000步",
"健身完成",
"睡前打卡"
];

if (!data[today]) {
data[today] = {
water: 0,
weight: null,
tasks: {}
};
tasksList.forEach(t => data[today].tasks[t] = false);
}

function save(){
localStorage.setItem("proData", JSON.stringify(data));
}

// BMI
function calcBMI(){
let h = document.getElementById("height").value/100;
let w = document.getElementById("weight").value;

let bmi = (w/(h*h)).toFixed(1);
let status = "";

if(bmi < 18.5) status="過瘦";
else if(bmi < 24) status="正常";
else if(bmi < 27) status="過重";
else status="肥胖";

document.getElementById("bmiResult").innerHTML =
`BMI: ${bmi} (${status})`;
}

// 喝水
function addWater(){
let v = parseInt(document.getElementById("waterInput").value);
if(!v) return;

data[today].water += v;
save();
render();
}

// 深色
function toggleDark(){
document.body.classList.toggle("dark");
}

// 任務
function toggleTask(t){
data[today].tasks[t] = !data[today].tasks[t];
save();
render();
}

// 渲染
function render(){

// water bar
let w = data[today].water;
let percent = Math.min(w/3500*100,100);
document.getElementById("waterBar").style.width = percent+"%";
document.getElementById("waterInfo").innerText = w+" / 3500ml";

// weight goal
let start=83, goal=75;
let current = data[today].weight || start;
let p = ((start-current)/(start-goal))*100;
document.getElementById("weightBar").style.width = p+"%";
document.getElementById("weightInfo").innerText = current+"kg";

// tasks
let html="";
tasksList.forEach(t=>{
html+=`
<div class="item">
<label>
<input type="checkbox" ${data[today].tasks[t]?"checked":""} onchange="toggleTask('${t}')">
${t}
</label>
</div>`;
});
document.getElementById("tasks").innerHTML=html;

// history 30 days
let keys = Object.keys(data).sort().slice(-30).reverse();
let h="";
keys.forEach(k=>{
h+=`<div>${k} ｜ 💧${data[k].water}ml ｜ ⚖️${data[k].weight||"-"}kg</div>`;
});
document.getElementById("history").innerHTML=h;
}

render();
</script>

</body>
</html>
